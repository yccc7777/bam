name: Chronos Daily AI Reports

on:
  schedule:
    - cron: '30 0 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      task_type:
        description: 'Choose task to run'
        required: true
        default: 'premarket'
        type: choice
        options:
        - premarket
        - postmarket

jobs:
  run-daily-task:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Determine task
      id: set-task
      run: |
                if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "TASK=${{ github.event.inputs.task_type }}" >> $GITHUB_ENV
        else
          if [ "${{ github.event.schedule }}" == "30 0 * * 1-5" ]; then
            echo "TASK=premarket" >> $GITHUB_ENV
          else
            echo "TASK=postmarket" >> $GITHUB_ENV
          fi
        fi


    - name: Run Chronos AI Task
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python run_daily_tasks.py --task $TASK
