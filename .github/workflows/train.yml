name: MLOps Nightly Training

on:
  schedule:
    # 每天台灣時間凌晨 02:00 自動執行
    - cron: '0 18 * * *'
  workflow_dispatch: # 允許你隨時手動點擊按鈕執行

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run MLOps Training Pipeline
      run: |
        python train_pipeline.py
        
    - name: Commit and Push Updated Weights
      run: |
        git config --global user.name "Project Chronos MLOps"
        git config --global user.email "mlops@projectchronos.ai"
        
        # 只上傳訓練好的權重檔案
        git add weights/
        
        if git diff --staged --quiet; then
          echo "No new weights to commit."
        else
          git commit -m "chore(mlops): update XGBoost and LSTM model weights [skip ci]"
          git push origin main
        fi
